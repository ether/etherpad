name: "Frontend tests"

on:
  push:
    paths-ignore:
      - 'doc/**'
  pull_request:
    paths-ignore:
      - 'doc/**'

permissions:
  contents: read

jobs:
  playwright-chrome:
    env:
      PNPM_HOME: ~/.pnpm-store
    name: Playwright Chrome
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        name: Cache pnpm store
        with:
          path: ${{ env.PNPM_HOME }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - uses: actions/cache@v5
        name: Cache node_modules
        with:
          path: |
            node_modules
            src/node_modules
            admin/node_modules
            ui/node_modules
            bin/node_modules
            doc/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - uses: actions/cache@v5
        name: Cache Playwright browsers
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('src/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10.33.2
          run_install: false
      -
        name: Install all dependencies and symlink for ep_etherpad-lite
        run: pnpm install --frozen-lockfile
      -
        name: Create settings.json
        run: cp ./src/tests/settings.json settings.json
      - name: Run the frontend tests
        shell: bash
        run: |
          pnpm run prod > /tmp/etherpad-server.log 2>&1 &
          connected=false
          can_connect() {
          curl -sSfo /dev/null http://localhost:9001/ || return 1
          connected=true
          }
          now() { date +%s; }
          start=$(now)
          while [ $(($(now) - $start)) -le 15 ] && ! can_connect; do
          sleep 1
          done
          cd src
          pnpm exec playwright install chromium  --with-deps
          pnpm run test-ui --project=chromium
      - name: Upload server log on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: server-log-chrome
          path: /tmp/etherpad-server.log
          retention-days: 7
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-chrome
          path: src/playwright-report/
          retention-days: 30
  playwright-firefox:
    env:
        PNPM_HOME: ~/.pnpm-store
    name: Playwright Firefox
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        name: Cache pnpm store
        with:
          path: ${{ env.PNPM_HOME }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - uses: actions/cache@v5
        name: Cache node_modules
        with:
          path: |
            node_modules
            src/node_modules
            admin/node_modules
            ui/node_modules
            bin/node_modules
            doc/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - uses: actions/cache@v5
        name: Cache Playwright browsers
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('src/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10.33.2
          run_install: false
      - name: Install all dependencies and symlink for ep_etherpad-lite
        run: pnpm install --frozen-lockfile
      - name: Create settings.json
        run: cp ./src/tests/settings.json settings.json
      - name: Run the frontend tests
        shell: bash
        run: |
          pnpm run prod > /tmp/etherpad-server.log 2>&1 &
          connected=false
          can_connect() {
          curl -sSfo /dev/null http://localhost:9001/ || return 1
          connected=true
          }
          now() { date +%s; }
          start=$(now)
          while [ $(($(now) - $start)) -le 15 ] && ! can_connect; do
          sleep 1
          done
          cd src
          pnpm exec playwright install firefox  --with-deps
          pnpm run test-ui --project=firefox
      - name: Upload server log on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: server-log-firefox
          path: /tmp/etherpad-server.log
          retention-days: 7
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-firefox
          path: src/playwright-report/
          retention-days: 30
